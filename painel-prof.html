<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel Professor</title>

<style>
body{
background:#0b132b;
color:white;
font-family:Arial;
padding:40px;
}

.card{
background:#1c2541;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:orange;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h2>Nova Aula</h2>

<input id="titulo" placeholder="Título">

<textarea id="descricao"
placeholder="Descrição"></textarea>

<input id="video"
placeholder="Link do vídeo YouTube">

<input id="pdf"
placeholder="Link do PDF">

<button id="salvar">
Publicar Aula
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBp4HTngTmzi3Kh2ejMSURnU8ctJoTJ1ms",
authDomain:"dom-music-127a8.firebaseapp.com",
projectId:"dom-music-127a8",
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

salvar.onclick=async()=>{

await addDoc(collection(db,"aulas"),{
titulo:titulo.value,
descricao:descricao.value,
video:video.value,
pdf:pdf.value
});

alert("Aula publicada!");

}
</script>

</body>
</html>
